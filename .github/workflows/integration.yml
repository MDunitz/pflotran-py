name: Integration Tests

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # weekly Monday 6am UTC
  workflow_dispatch:  # manual trigger

jobs:
  pflotran-integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Docker is native on GitHub-hosted runners; Podman is installed below.
        runtime: [docker, podman]

    steps:
      - uses: actions/checkout@v4

      - name: Install Podman
        if: matrix.runtime == 'podman'
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
          podman --version

      - name: Build PFLOTRAN test image (${{ matrix.runtime }})
        run: ${{ matrix.runtime }} build -t pflotran-py-test -f Containerfile .

      - name: Run integration tests in container (${{ matrix.runtime }})
        run: |
          # Podman on SELinux hosts needs :Z; Docker ignores unknown options poorly,
          # so only append :Z for Podman.
          if [ "${{ matrix.runtime }}" = "podman" ]; then
            VOL="${{ github.workspace }}:/work:Z"
          else
            VOL="${{ github.workspace }}:/work"
          fi
          ${{ matrix.runtime }} run --rm \
            -v "$VOL" \
            -w /work \
            pflotran-py-test \
            pytest tests/ -v --tb=short -m integration
